<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f0ede8;color:#1c1a17;min-height:100vh}
.app-header{background:#fff;border-bottom:3px solid #1a6fa0;padding:14px 24px;display:flex;align-items:center;gap:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.app-header img{height:44px;width:auto}
.app-header .divider{width:1px;height:36px;background:#ddd}
.app-header .app-title{font-size:15px;font-weight:600;color:#1c1a17;line-height:1.2}
.app-header .app-sub{font-family:'DM Mono',monospace;font-size:10px;color:#9ea3a8;letter-spacing:0.08em;margin-top:2px}
.app-content{padding:24px;max-width:520px}
#drop{border:2px dashed #9ea3a8;border-radius:8px;padding:36px;text-align:center;cursor:pointer;background:#fff;transition:all .2s;margin-bottom:16px}
#drop:hover,#drop.over{border-color:#1a6fa0;background:#e8f3f9}
#drop.ok{border-style:solid;border-color:#1a6fa0;background:#e8f3f9}
#drop .ico{font-size:32px;margin-bottom:8px}
#drop .lbl{font-size:13px;color:#7a7368;line-height:1.6}
#drop .fn{font-family:'DM Mono',monospace;font-size:12px;color:#1a6fa0;margin-top:4px;word-break:break-all}
#fi{display:none}
.btn{width:100%;padding:11px;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:8px}
.btn-p{background:#1a6fa0;color:#fff}.btn-p:hover:not(:disabled){background:#155a83}
.btn-p:disabled{background:#9ea3a8;color:#fff;cursor:not-allowed}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
#log{background:#1c1a17;border-radius:6px;padding:12px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.8;color:rgba(255,255,255,.6);max-height:160px;overflow-y:auto;margin-top:16px}
.ok{color:#6ee7a0}.er{color:#f87171}.in{color:#93c5fd}.di{color:rgba(255,255,255,.3)}
#res{display:none;margin-top:14px;background:#e8f3f9;border:1px solid #1a6fa0;border-radius:6px;padding:12px}
#res.show{display:block}
#res strong{color:#1a6fa0;font-size:13px}
.dl-btn{display:inline-block;margin-top:8px;padding:8px 16px;background:#1a6fa0;color:#fff;border-radius:5px;font-size:12px;font-weight:600;text-decoration:none;border:none;font-family:'DM Sans',sans-serif;cursor:pointer}
.dl-btn:hover{background:#155a83}
.app-footer{margin-top:32px;padding-top:16px;border-top:1px solid #d8d3cb;font-size:11px;color:#9ea3a8;font-family:'DM Mono',monospace}
</style>

<script>
// ── SPJ PARSER ──────────────────────────────────────────────────────────────
const OY=84,OX=92,OZ=100;
function ru16(b,o){let e=o;while(e+1<b.length&&!(b[e]===0&&b[e+1]===0))e+=2;return new TextDecoder('utf-16le').decode(b.slice(o,e));}
function nu16(b,o,d=120){let i=o,e=Math.min(o+d,b.length-2);while(i<e){if(b[i]>=0x20&&b[i]<=0x7E&&b[i+1]===0){const s=ru16(b,i);if(s.length>=2)return s;}i+=2;}return '';}
function rf64(v,o){return o+8>v.byteLength?null:v.getFloat64(o,true);}
function fpat(b,p){const r=[];outer:for(let i=0;i<=b.length-p.length;i++){for(let j=0;j<p.length;j++)if(b[i+j]!==p[j])continue outer;r.push(i);}return r;}
function parseSpj(buf){
  const b=new Uint8Array(buf),v=new DataView(buf);
  const SK=['tablet','sams','trimble','sps','eap','topo','linept'],c=[];
  for(const pos of fpat(b,[0x54,0x00,0x6F,0x00,0x70,0x00,0x6F,0x00])){const n=ru16(b,pos);if(/^Topo[\d+]*$/.test(n))c.push({pos,type:'topo',name:n});}
  for(const pos of fpat(b,[0x4C,0x00,0x69,0x00,0x6E,0x00,0x65,0x00,0x50,0x00,0x74,0x00])){const n=ru16(b,pos);if(/^LinePt\d*$/.test(n))c.push({pos,type:'linept',name:n});}
  c.sort((a,b)=>a.pos-b.pos);
  const topo=[],linept=[];
  for(const{pos,type,name}of c){
    const y=rf64(v,pos+OY),x=rf64(v,pos+OX),z=rf64(v,pos+OZ);
    if(!x||!y||!z||!(x>7000&&x<300000&&y>289000&&y<629000)||!(z>-50&&z<500))continue;
    let code=nu16(b,pos+name.length*2+2,80);
    if(['tablet','sams','trimble','sps','eap','topo','linept'].some(s=>code.toLowerCase().includes(s)))code='';
    (type==='topo'?topo:linept).push({name,code,x,y,z});
  }
  return{topo,linept};
}

// ── PNT PARSER ──────────────────────────────────────────────────────────────
// Tab-gescheiden: X \t Y \t Z \t naam \t (leeg) \t datum \t 3ds \t laag
function parsePnt(text){
  const lines = text.split(/\r?\n/).filter(l=>l.trim());
  const pts = [];
  for(const line of lines){
    const cols = line.split('\t');
    if(cols.length < 3) continue;
    const x = parseFloat(cols[0]);
    const y = parseFloat(cols[1]);
    const z = parseFloat(cols[2]);
    if(isNaN(x)||isNaN(y)||isNaN(z)) continue;
    if(!(x>7000&&x<300000&&y>289000&&y<629000)) continue;
    pts.push({
      name:   (cols[3]||'').trim(),
      code:   (cols[7]||cols[6]||'').trim(),
      datum:  (cols[5]||'').trim(),
      x, y, z
    });
  }
  return pts;
}
// Gebruik DataView voor correcte byte-schrijving
function i32be(v,dv,o){dv.setInt32(o,v,false);}
function i32le(v,dv,o){dv.setInt32(o,v,true);}
function f64le(v,dv,o){dv.setFloat64(o,v,true);}

function writeShpHeader(dv,fileCode,fileLen,shapeType,minX,minY,maxX,maxY){
  i32be(fileCode,dv,0);
  i32be(fileLen,dv,24);   // file length in 16-bit words
  i32le(1000,dv,28);      // version
  i32le(shapeType,dv,32); // shape type
  f64le(minX,dv,36);      // bounding box
  f64le(minY,dv,44);
  f64le(maxX,dv,52);
  f64le(maxY,dv,60);
  f64le(0,dv,68);f64le(0,dv,76); // Z range
  f64le(0,dv,84);f64le(0,dv,92); // M range
}

// ── PUNT SHAPEFILE ──────────────────────────────────────────────────────────
function buildPointShp(pts){
  // Elke punt-record: 8 bytes record header + 4 bytes shape type + 16 bytes XY = 28 bytes
  const recBytes = 28;
  const fileBytes = 100 + pts.length * recBytes;
  const fileLen = fileBytes / 2; // in 16-bit words

  const buf = new ArrayBuffer(fileBytes);
  const dv  = new DataView(buf);

  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const p of pts){minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);}

  writeShpHeader(dv,9994,fileLen,1,minX,minY,maxX,maxY);

  pts.forEach((p,i)=>{
    const o = 100 + i * recBytes;
    i32be(i+1, dv, o);      // record number (1-based)
    i32be(10,  dv, o+4);    // content length in 16-bit words (4+16=20 bytes = 10 words)
    i32le(1,   dv, o+8);    // shape type = point
    f64le(p.x, dv, o+12);
    f64le(p.y, dv, o+20);
  });

  return new Uint8Array(buf);
}

function buildPointShx(pts){
  const fileBytes = 100 + pts.length * 8;
  const fileLen   = fileBytes / 2;
  const buf = new ArrayBuffer(fileBytes);
  const dv  = new DataView(buf);

  writeShpHeader(dv,9994,fileLen,1,0,0,0,0);

  pts.forEach((p,i)=>{
    const o = 100 + i * 8;
    i32be(50 + i*14, dv, o);   // offset in 16-bit words (100 bytes header = 50 words, elke rec = 28 bytes = 14 words)
    i32be(10,        dv, o+4); // content length in 16-bit words
  });

  return new Uint8Array(buf);
}

// ── LIJN SHAPEFILE ──────────────────────────────────────────────────────────
function buildLineShp(lines){
  // Per lijn-record:
  // 8 header + 4 type + 32 bbox + 4 numparts + 4 numpoints + 4 part[0] + n*16 coords
  const recContentBytes = line => 4+32+4+4+4+line.coords.length*16;
  const recTotalBytes   = line => 8 + recContentBytes(line);

  const fileBytes = 100 + lines.reduce((s,l)=>s+recTotalBytes(l),0);
  const fileLen   = fileBytes / 2;

  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const l of lines)for(const[x,y]of l.coords){
    minX=Math.min(minX,x);minY=Math.min(minY,y);maxX=Math.max(maxX,x);maxY=Math.max(maxY,y);
  }

  const buf = new ArrayBuffer(fileBytes);
  const dv  = new DataView(buf);
  writeShpHeader(dv,9994,fileLen,3,minX,minY,maxX,maxY);

  // SHX
  const shxBytes = 100 + lines.length * 8;
  const shxBuf   = new ArrayBuffer(shxBytes);
  const shxDv    = new DataView(shxBuf);
  writeShpHeader(shxDv,9994,shxBytes/2,3,minX,minY,maxX,maxY);

  let off = 100;
  lines.forEach((l,i)=>{
    const n   = l.coords.length;
    const cLen = recContentBytes(l) / 2; // in 16-bit words
    const shpOff = off / 2; // offset in 16-bit words

    // SHX record
    i32be(shpOff, shxDv, 100+i*8);
    i32be(cLen,   shxDv, 100+i*8+4);

    // SHP record header
    i32be(i+1, dv, off);
    i32be(cLen,dv, off+4);
    off += 8;

    // SHP record content
    const bx=l.coords.reduce((m,[x])=>Math.min(m,x),Infinity);
    const by=l.coords.reduce((m,[,y])=>Math.min(m,y),Infinity);
    const bX=l.coords.reduce((m,[x])=>Math.max(m,x),-Infinity);
    const bY=l.coords.reduce((m,[,y])=>Math.max(m,y),-Infinity);

    i32le(3,  dv, off);     // shape type
    f64le(bx, dv, off+4);
    f64le(by, dv, off+12);
    f64le(bX, dv, off+20);
    f64le(bY, dv, off+28);
    i32le(1,  dv, off+36);  // num parts
    i32le(n,  dv, off+40);  // num points
    i32le(0,  dv, off+44);  // part 0 starts at index 0
    off += 48;

    l.coords.forEach(([x,y])=>{
      f64le(x, dv, off);
      f64le(y, dv, off+8);
      off += 16;
    });
  });

  return{shp:new Uint8Array(buf), shx:new Uint8Array(shxBuf)};
}

// ── DBF SCHRIJVER ───────────────────────────────────────────────────────────
function buildDbf(records, fields){
  const headerSize = 32 + fields.length*32 + 1;
  const recSize    = 1 + fields.reduce((s,f)=>s+f.len,0);
  const buf = new ArrayBuffer(headerSize + records.length*recSize);
  const dv  = new DataView(buf);
  const enc = new TextEncoder();

  dv.setUint8(0,3); // dBASE III
  const d=new Date();
  dv.setUint8(1,d.getFullYear()-1900);dv.setUint8(2,d.getMonth()+1);dv.setUint8(3,d.getDate());
  dv.setInt32(4,records.length,true);
  dv.setInt16(8,headerSize,true);
  dv.setInt16(10,recSize,true);

  fields.forEach((f,i)=>{
    const o=32+i*32;
    const nb=enc.encode(f.name.substring(0,10).padEnd(11,'\0'));
    nb.forEach((b,j)=>dv.setUint8(o+j,b));
    dv.setUint8(o+11,f.type.charCodeAt(0));
    dv.setUint8(o+16,f.len);
    dv.setUint8(o+17,f.dec||0);
  });
  dv.setUint8(32+fields.length*32,0x0D); // header terminator

  const bytes = new Uint8Array(buf);
  records.forEach((rec,i)=>{
    let o = headerSize + i*recSize;
    bytes[o++] = 0x20; // not deleted
    for(const f of fields){
      const val = String(rec[f.name]===undefined?'':rec[f.name]).substring(0,f.len).padEnd(f.len,' ');
      enc.encode(val).forEach(b=>bytes[o++]=b);
    }
  });
  return new Uint8Array(buf);
}

// ── PRJ — RD New (EPSG:28992) ───────────────────────────────────────────────
function buildPrj(){
  // Exacte EPSG:28992 WKT met AUTHORITY tags — ArcGIS en AGOL herkennen dit direct
  return 'PROJCS["Amersfoort / RD New",GEOGCS["Amersfoort",DATUM["Amersfoort",SPHEROID["Bessel 1841",6377397.155,299.1528128,AUTHORITY["EPSG","7004"]],TOWGS84[565.417,50.3319,465.552,-0.398957,0.343988,-1.8774,4.0725],AUTHORITY["EPSG","6289"]],PRIMEM["Greenwich",0,AUTHORITY["EPSG","8901"]],UNIT["degree",0.0174532925199433,AUTHORITY["EPSG","9122"]],AUTHORITY["EPSG","4289"]],PROJECTION["Oblique_Stereographic"],PARAMETER["latitude_of_origin",52.15616055555555],PARAMETER["central_meridian",5.38763888888889],PARAMETER["scale_factor",0.9999079],PARAMETER["false_easting",155000],PARAMETER["false_northing",463000],UNIT["metre",1,AUTHORITY["EPSG","9001"]],AXIS["X",EAST],AXIS["Y",NORTH],AUTHORITY["EPSG","28992"]]';
}

// ── PNT PARSER ──────────────────────────────────────────────────────────────
function parsePnt(text){
  const pts=[];
  for(const line of text.split(/\r?\n/).filter(l=>l.trim())){
    const c=line.split('\t');
    if(c.length<3)continue;
    const x=parseFloat(c[0]),y=parseFloat(c[1]),z=parseFloat(c[2]);
    if(isNaN(x)||isNaN(y)||isNaN(z))continue;
    if(!(x>7000&&x<300000&&y>289000&&y<629000))continue;
    pts.push({name:(c[3]||'').trim(),code:(c[7]||c[6]||'').trim(),datum:(c[5]||'').trim(),x,y,z});
  }
  return pts;
}

// ── CONVERT ────────────────────────────────────────────────────────────────
async function doConvert(){
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.innerHTML='<span class="sp"></span>Bezig...';
  clearLog();document.getElementById('res').classList.remove('show');
  try{
    log('Bestand inlezen...','in');
    const base=selFile.name.replace(/\.(spj|pnt)$/i,'');
    const isPnt=selFile.name.toLowerCase().endsWith('.pnt');
    let allPts=[],lines=[];

    if(isPnt){
      log('PNT parsen...','in');
      const text=await selFile.text();
      allPts=parsePnt(text);
      log(`${allPts.length} punten gevonden`,'ok');
      if(!allPts.length)throw new Error('Geen geldige punten gevonden in PNT bestand.');
    } else {
      log('SPJ parsen...','in');
      const buf=await selFile.arrayBuffer();
      const{topo,linept}=parseSpj(buf);
      log(`${topo.length} punten, ${linept.length} lijnpunten gevonden`,'ok');
      if(!topo.length&&!linept.length)throw new Error('Geen punten gevonden.');
      const groups={},extra=[];
      for(const p of linept)(groups[p.code||'onbekend']=groups[p.code||'onbekend']||[]).push(p);
      for(const[code,pts]of Object.entries(groups)){
        if(pts.length<2){extra.push(...pts);continue;}
        lines.push({code,coords:pts.map(p=>[p.x,p.y]),pts});
      }
      allPts=[...topo,...extra];
    }

    log('GeoJSON bouwen...','in');
    const geoJSON={
      type:'FeatureCollection',
      name:base,
      crs:{type:'name',properties:{name:'urn:ogc:def:crs:EPSG::28992'}},
      features:[
        ...allPts.map(p=>({
          type:'Feature',
          geometry:{type:'Point',coordinates:[p.x,p.y,p.z]},
          properties:{naam:p.name,code:p.code,hoogte:Math.round(p.z*1000)/1000,datum:p.datum||'',type:'punt'}
        })),
        ...lines.map(l=>({
          type:'Feature',
          geometry:{type:'LineString',coordinates:l.coords.map(([x,y])=>[x,y])},
          properties:{naam:'',code:l.code,hoogte:null,datum:'',type:'lijn',aantal_pt:l.pts.length}
        }))
      ]
    };

    const blob=new Blob([JSON.stringify(geoJSON,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    document.getElementById('dl').innerHTML=
      `<a class="dl-btn" href="${url}" download="${base}.geojson">&#11015; Download ${base}.geojson</a>`;
    document.getElementById('res').classList.add('show');
    log(`Klaar! ${allPts.length} punten en ${lines.length} lijnen.`,'ok');

  }catch(e){log('Fout: '+e.message,'er');console.error(e);}
  finally{btn.disabled=false;btn.innerHTML='Omzetten naar GeoJSON &#8594;';updateBtn();}
}

// ── UI ─────────────────────────────────────────────────────────────────────
const logEl=document.getElementById('log');
function log(m,t){const s=document.createElement('span');s.className=t;s.textContent=`> ${m}\n`;logEl.appendChild(s);logEl.scrollTop=logEl.scrollHeight;}
function clearLog(){logEl.innerHTML='';}
let selFile=null;
function setFile(f){
  if(!f||!f.name.toLowerCase().match(/\.(spj|pnt)$/)){log('Alleen .spj of .pnt bestanden.','er');return;}
  selFile=f;
  const d=document.getElementById('drop');
  d.classList.add('ok');
  d.innerHTML=`<div class="ico">&#128196;</div><div class="fn">${f.name}</div><div class="lbl" style="font-size:11px;margin-top:4px">${(f.size/1024).toFixed(1)} KB</div>`;
  updateBtn();
}
const dz=document.getElementById('drop');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');setFile(e.dataTransfer.files[0]);});
document.getElementById('fi').addEventListener('change',e=>setFile(e.target.files[0]));
function updateBtn(){document.getElementById('btn').disabled=!selFile;}
</script>
