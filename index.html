<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>SPJ naar Shapefile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f0ede8;color:#1c1a17;padding:24px;min-height:100vh}
h2{font-size:16px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:10px}
h2 span{font-family:'DM Mono',monospace;font-size:10px;color:#7a7368;letter-spacing:.1em}
#drop{border:2px dashed #d8d3cb;border-radius:8px;padding:36px;text-align:center;cursor:pointer;background:#fff;transition:all .2s;margin-bottom:16px}
#drop:hover,#drop.over{border-color:#1a5c8a;background:#eef4fb}
#drop.ok{border-style:solid;border-color:#1a5c8a;background:#eef4fb}
#drop .ico{font-size:32px;margin-bottom:8px}
#drop .lbl{font-size:13px;color:#7a7368;line-height:1.6}
#drop .fn{font-family:'DM Mono',monospace;font-size:12px;color:#1a5c8a;margin-top:4px;word-break:break-all}
#fi{display:none}
.btn{width:100%;padding:11px;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:8px}
.btn-p{background:#1a5c8a;color:#fff}.btn-p:hover:not(:disabled){background:#154e78}
.btn-p:disabled{background:#d8d3cb;color:#7a7368;cursor:not-allowed}
.btn-s{background:#fff;color:#1a5c8a;border:1px solid #1a5c8a}.btn-s:hover{background:#eef4fb}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
#log{background:#1c1a17;border-radius:6px;padding:12px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.8;color:rgba(255,255,255,.6);max-height:160px;overflow-y:auto;margin-top:16px}
.ok{color:#6ee7a0}.er{color:#f87171}.in{color:#93c5fd}.di{color:rgba(255,255,255,.3)}
#res{display:none;margin-top:14px;background:#eef7f0;border:1px solid #a8d5b5;border-radius:6px;padding:12px}
#res.show{display:block}
#res strong{color:#1e6e42;font-size:13px}
.dl-btn{display:inline-block;margin-top:8px;margin-right:8px;padding:7px 14px;background:#1a5c8a;color:#fff;border-radius:5px;font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
.dl-btn:hover{background:#154e78}
</style>
</head>
<body>
<h2>📍 SPJ naar Shapefile <span>TRIMBLE CONVERTER</span></h2>

<div id="drop" onclick="document.getElementById('fi').click()">
  <div class="ico">📂</div>
  <div class="lbl">Sleep een <strong>.spj</strong> bestand hierheen<br>of klik om te bladeren</div>
</div>
<input type="file" id="fi" accept=".spj">

<button class="btn btn-p" id="btn" disabled onclick="doConvert()">Omzetten naar Shapefile →</button>

<div id="log"><span class="di">Wacht op bestand...</span></div>
<div id="res"><strong>✓ Klaar!</strong><br><div id="dl"></div></div>

<script>
// ── SPJ PARSER ──────────────────────────────────────────────────────────────
const OY=84,OX=92,OZ=100;
function ru16(b,o){let e=o;while(e+1<b.length&&!(b[e]===0&&b[e+1]===0))e+=2;return new TextDecoder('utf-16le').decode(b.slice(o,e));}
function nu16(b,o,d=120){let i=o,e=Math.min(o+d,b.length-2);while(i<e){if(b[i]>=0x20&&b[i]<=0x7E&&b[i+1]===0){const s=ru16(b,i);if(s.length>=2)return s;}i+=2;}return '';}
function rf64(v,o){return o+8>v.byteLength?null:v.getFloat64(o,true);}
function fpat(b,p){const r=[];outer:for(let i=0;i<=b.length-p.length;i++){for(let j=0;j<p.length;j++)if(b[i+j]!==p[j])continue outer;r.push(i);}return r;}
function parseSpj(buf){
  const b=new Uint8Array(buf),v=new DataView(buf);
  const SK=['tablet','sams','trimble','sps','eap','topo','linept'],c=[];
  for(const pos of fpat(b,[0x54,0x00,0x6F,0x00,0x70,0x00,0x6F,0x00])){const n=ru16(b,pos);if(/^Topo[\d+]*$/.test(n))c.push({pos,type:'topo',name:n});}
  for(const pos of fpat(b,[0x4C,0x00,0x69,0x00,0x6E,0x00,0x65,0x00,0x50,0x00,0x74,0x00])){const n=ru16(b,pos);if(/^LinePt\d*$/.test(n))c.push({pos,type:'linept',name:n});}
  c.sort((a,b)=>a.pos-b.pos);
  const topo=[],linept=[];
  for(const{pos,type,name}of c){
    const y=rf64(v,pos+OY),x=rf64(v,pos+OX),z=rf64(v,pos+OZ);
    if(!x||!y||!z||!(x>7000&&x<300000&&y>289000&&y<629000)||!(z>-50&&z<500))continue;
    let code=nu16(b,pos+name.length*2+2,80);
    if(SK.some(s=>code.toLowerCase().includes(s)))code='';
    (type==='topo'?topo:linept).push({name,code,x,y,z});
  }
  return{topo,linept};
}

// ── SHAPEFILE WRITER ────────────────────────────────────────────────────────
// Schrijft binaire SHP/SHX/DBF bestanden conform ESRI shapefile spec

function writeInt32BE(v,buf,o){buf[o]=(v>>24)&0xFF;buf[o+1]=(v>>16)&0xFF;buf[o+2]=(v>>8)&0xFF;buf[o+3]=v&0xFF;}
function writeInt32LE(v,buf,o){buf[o]=v&0xFF;buf[o+1]=(v>>8)&0xFF;buf[o+2]=(v>>16)&0xFF;buf[o+3]=(v>>24)&0xFF;}
function writeFloat64LE(v,buf,o){const t=new DataView(new ArrayBuffer(8));t.setFloat64(0,v,true);new Uint8Array(t.buffer).forEach((b,i)=>buf[o+i]=b);}

function buildPointShp(pts){
  // SHP voor punten (type 1)
  const recSize=28; // 8 header + 20 content per punt
  const fileLen=50+pts.length*(recSize/2); // in 16-bit words
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const p of pts){minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);}

  const buf=new Uint8Array(100+pts.length*recSize);
  // File header
  writeInt32BE(9994,buf,0);writeInt32BE(fileLen,buf,24);writeInt32LE(1000,buf,28);
  writeInt32LE(1,buf,32); // shape type: point
  writeFloat64LE(minX,buf,36);writeFloat64LE(minY,buf,44);writeFloat64LE(maxX,buf,52);writeFloat64LE(maxY,buf,60);

  // Records
  pts.forEach((p,i)=>{
    const o=100+i*recSize;
    writeInt32BE(i+1,buf,o);writeInt32BE(10,buf,o+4); // record header (len in 16-bit words)
    writeInt32LE(1,buf,o+8); // shape type
    writeFloat64LE(p.x,buf,o+12);writeFloat64LE(p.y,buf,o+20);
  });
  return buf;
}

function buildPointShx(pts){
  const buf=new Uint8Array(100+pts.length*8);
  const fileLen=(50+pts.length*4);
  writeInt32BE(9994,buf,0);writeInt32BE(fileLen,buf,24);writeInt32LE(1000,buf,28);writeInt32LE(1,buf,32);
  pts.forEach((p,i)=>{
    const o=100+i*8;
    writeInt32BE(50+i*14,buf,o); // offset in 16-bit words
    writeInt32BE(10,buf,o+4);    // content length
  });
  return buf;
}

function buildLineShp(lines){
  // SHP voor polylines (type 3)
  let totalPts=0;
  for(const l of lines)totalPts+=l.coords.length;
  const recBaseSize=8+4+16+4+4+8; // header+type+bbox+numparts+numpoints+part offset
  const fileBytes=100+lines.reduce((s,l)=>s+8+4+16+4+4+4+l.coords.length*16,0);
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const l of lines)for(const[x,y]of l.coords){minX=Math.min(minX,x);minY=Math.min(minY,y);maxX=Math.max(maxX,x);maxY=Math.max(maxY,y);}

  const buf=new Uint8Array(fileBytes);
  writeInt32BE(9994,buf,0);writeInt32BE(fileBytes/2,buf,24);writeInt32LE(1000,buf,28);writeInt32LE(3,buf,32);
  writeFloat64LE(minX,buf,36);writeFloat64LE(minY,buf,44);writeFloat64LE(maxX,buf,52);writeFloat64LE(maxY,buf,60);

  let off=100,shxOff=0;
  const shxBuf=new Uint8Array(100+lines.length*8);
  writeInt32BE(9994,shxBuf,0);writeInt32BE((50+lines.length*4),shxBuf,24);writeInt32LE(1000,shxBuf,28);writeInt32LE(3,shxBuf,32);

  lines.forEach((l,i)=>{
    const n=l.coords.length;
    const cLen=2+8+4+4+4+n*2; // content length in 16-bit words
    writeInt32BE(i+1,buf,off);writeInt32BE(cLen,buf,off+4);
    writeInt32LE(3,buf,off+8);
    const bx=l.coords.reduce((m,[x])=>Math.min(m,x),Infinity);
    const by=l.coords.reduce((m,[,y])=>Math.min(m,y),Infinity);
    const bX=l.coords.reduce((m,[x])=>Math.max(m,x),-Infinity);
    const bY=l.coords.reduce((m,[,y])=>Math.max(m,y),-Infinity);
    writeFloat64LE(bx,buf,off+12);writeFloat64LE(by,buf,off+20);writeFloat64LE(bX,buf,off+28);writeFloat64LE(bY,buf,off+36);
    writeInt32LE(1,buf,off+44);writeInt32LE(n,buf,off+48);writeInt32LE(0,buf,off+52);
    l.coords.forEach(([x,y],j)=>{writeFloat64LE(x,buf,off+56+j*16);writeFloat64LE(y,buf,off+56+j*16+8);});
    writeInt32BE(off/2,shxBuf,100+i*8);writeInt32BE(cLen,shxBuf,100+i*8+4);
    off+=8+4+16+4+4+4+n*16;
  });
  return{shp:buf,shx:shxBuf};
}

function buildDbf(records,fields){
  // DBF schrijver (dBASE III)
  const headerSize=32+(fields.length*32)+1;
  const recSize=1+fields.reduce((s,f)=>s+f.len,0);
  const buf=new Uint8Array(headerSize+records.length*recSize);
  const enc=new TextEncoder();

  buf[0]=3; // version
  const d=new Date();
  buf[1]=d.getFullYear()-1900;buf[2]=d.getMonth()+1;buf[3]=d.getDate();
  writeInt32LE(records.length,buf,4);
  buf[8]=headerSize&0xFF;buf[9]=(headerSize>>8)&0xFF;
  buf[10]=recSize&0xFF;buf[11]=(recSize>>8)&0xFF;

  // Field descriptors
  fields.forEach((f,i)=>{
    const o=32+i*32;
    const nb=enc.encode(f.name.substring(0,10).padEnd(11,'\0'));
    nb.forEach((b,j)=>buf[o+j]=b);
    buf[o+11]=f.type.charCodeAt(0);
    buf[o+16]=f.len;buf[o+17]=f.dec||0;
  });
  buf[32+fields.length*32]=0x0D; // header terminator

  // Records
  records.forEach((rec,i)=>{
    let o=headerSize+i*recSize;
    buf[o++]=0x20; // deletion flag
    for(const f of fields){
      const val=String(rec[f.name]||'').substring(0,f.len).padEnd(f.len,' ');
      enc.encode(val).forEach(b=>buf[o++]=b);
    }
  });
  return buf;
}

function buildPrj(){
  // RD New projectie WKT
  return `PROJCS["RD_New",GEOGCS["GCS_Amersfoort",DATUM["D_Amersfoort",SPHEROID["Bessel_1841",6377397.155,299.1528128]],PRIMEM["Greenwich",0.0],UNIT["Degree",0.0174532925199433]],PROJECTION["Double_Stereographic"],PARAMETER["False_Easting",155000.0],PARAMETER["False_Northing",463000.0],PARAMETER["Central_Meridian",5.38720621],PARAMETER["Scale_Factor",0.9999079],PARAMETER["Latitude_Of_Origin",52.15616056],UNIT["Meter",1.0]]`;
}

// ── CONVERT ────────────────────────────────────────────────────────────────
async function doConvert(){
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.innerHTML='<span class="sp"></span>Bezig...';
  clearLog();document.getElementById('res').classList.remove('show');
  try{
    log('Bestand inlezen...','in');
    const buf=await selFile.arrayBuffer();
    log('SPJ parsen...','in');
    const{topo,linept}=parseSpj(buf);
    log(`${topo.length} punten, ${linept.length} lijnpunten gevonden`,'ok');
    if(!topo.length&&!linept.length)throw new Error('Geen punten gevonden.');

    // Lijngroepen
    const groups={},extra=[];
    for(const p of linept){(groups[p.code||'onbekend']=groups[p.code||'onbekend']||[]).push(p);}
    const lines=[];
    for(const[code,pts]of Object.entries(groups)){
      if(pts.length<2){extra.push(...pts);continue;}
      lines.push({code,coords:pts.map(p=>[p.x,p.y]),pts});
    }
    const allPts=[...topo,...extra];

    log('Shapefile bestanden opbouwen...','in');
    const zip=new JSZip();
    const prj=buildPrj();
    const baseName=selFile.name.replace(/\.spj$/i,'');

    // ── Punten shapefile ──
    if(allPts.length){
      const shp=buildPointShp(allPts);
      const shx=buildPointShx(allPts);
      const fields=[
        {name:'NAAM',type:'C',len:20},
        {name:'CODE',type:'C',len:30},
        {name:'HOOGTE',type:'N',len:10,dec:3},
      ];
      const recs=allPts.map(p=>({NAAM:p.name,CODE:p.code,HOOGTE:p.z.toFixed(3)}));
      const dbf=buildDbf(recs,fields);
      zip.file(`${baseName}_punten.shp`,shp);
      zip.file(`${baseName}_punten.shx`,shx);
      zip.file(`${baseName}_punten.dbf`,dbf);
      zip.file(`${baseName}_punten.prj`,prj);
      log(`Puntlaag: ${allPts.length} punten`,'ok');
    }

    // ── Lijnen shapefile ──
    if(lines.length){
      const{shp,shx}=buildLineShp(lines);
      const fields=[{name:'CODE',type:'C',len:30},{name:'AANTAL_PT',type:'N',len:5,dec:0}];
      const recs=lines.map(l=>({CODE:l.code,AANTAL_PT:l.pts.length}));
      const dbf=buildDbf(recs,fields);
      zip.file(`${baseName}_lijnen.shp`,shp);
      zip.file(`${baseName}_lijnen.shx`,shx);
      zip.file(`${baseName}_lijnen.dbf`,dbf);
      zip.file(`${baseName}_lijnen.prj`,prj);
      log(`Lijnlaag: ${lines.length} lijnen`,'ok');
    }

    log('ZIP aanmaken...','in');
    const zipBlob=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(zipBlob);
    const fname=`${baseName}_shapefiles.zip`;

    document.getElementById('dl').innerHTML=`
      <a class="dl-btn" href="${url}" download="${fname}">⬇ Download ${fname}</a>`;
    document.getElementById('res').classList.add('show');
    log(`Klaar! ZIP bevat ${allPts.length} punten en ${lines.length} lijnen.`,'ok');

  }catch(e){log('Fout: '+e.message,'er');console.error(e);}
  finally{btn.disabled=false;btn.innerHTML='Omzetten naar Shapefile →';updateBtn();}
}

// ── UI ─────────────────────────────────────────────────────────────────────
const logEl=document.getElementById('log');
function log(m,t){const s=document.createElement('span');s.className=t;s.textContent=`> ${m}\n`;logEl.appendChild(s);logEl.scrollTop=logEl.scrollHeight;}
function clearLog(){logEl.innerHTML='';}

let selFile=null;
function setFile(f){
  if(!f||!f.name.toLowerCase().endsWith('.spj')){log('Alleen .spj bestanden.','er');return;}
  selFile=f;
  const d=document.getElementById('drop');
  d.classList.add('ok');
  d.innerHTML=`<div class="ico">📄</div><div class="fn">${f.name}</div><div class="lbl" style="font-size:11px;margin-top:4px">${(f.size/1024).toFixed(1)} KB</div>`;
  updateBtn();
}
const dz=document.getElementById('drop');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');setFile(e.dataTransfer.files[0]);});
document.getElementById('fi').addEventListener('change',e=>setFile(e.target.files[0]));
function updateBtn(){document.getElementById('btn').disabled=!selFile;}
</script>
</body>
</html>
